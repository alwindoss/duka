# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  GREETING: Hello, world!
  APPLICATION_NAME: duka
  BUILD_ENV: CGO_ENABLED=0
  BUILD_FLAGS: -o
  BINARY_LOC: bin
  GOBUILD: go build
  GOTEST: go test
  VERSION: 0.0.1

tasks:
  default:
    cmds:
      - task: setup
    desc: Default command
    # silent: true
  setup:
    cmds:
      - cd ui && npm i
      - go get -v ./...
  clean:
    cmds:
      - cd ui && rm -rf dist
      - rm -rf {{.BINARY_LOC}}
  test:
    cmds:
      - "{{.GOTEST}} -v ./..."
  build:
    cmds:
      - "{{.BUILD_ENVS}} {{.GOBUILD}} {{.BUILD_FLAGS}} ./{{.BINARY_LOC}}/ -v ./cmd/{{.APPLICATION_NAME}}/..."
    sources:
      - "**/*.go"
    generates:
      - "{{.BINARY_LOC}}/{{.APPLICATION_NAME}}"
    # watch: true
  build-ui:
    cmds:
      - cd ui && npm run build
  run:
    cmds:
      - task: clean
      - task: build-ui
      - task: build
      - ./{{.BINARY_LOC}}/{{.APPLICATION_NAME}}
  migrate:
    cmds:
      - go tool migrate -database YOUR_DATABASE_URL -path PATH_TO_YOUR_MIGRATIONS up # Update this command with the right arguments when you have it
  dev:
    cmds:
      - task: ui-dev
      - task: go-dev
  ui-dev:
    desc: Start Vue development server
    cmds:
      - cd ui && npm run dev
  go-dev:
    desc: Start Go server with live reload
    cmds:
      - go tool air