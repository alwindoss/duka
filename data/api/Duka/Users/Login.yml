info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: http://{{HOST}}:{{PORT}}/duka/api/v1/users/login
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "user_name": "dukaadmin",
        "password": "password@123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
